server {
    listen 80;
    server_name tsk.bitcoinekasi.xyz;

    # Redirect all HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name tsk.bitcoinekasi.xyz;

    ssl_certificate     /etc/letsencrypt/live/tsk.bitcoinekasi.xyz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tsk.bitcoinekasi.xyz/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Increase body size for QR/image uploads
    client_max_body_size 5M;

    location / {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;

        # WebSocket support (for Blink WS subscription)
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
    }
}
